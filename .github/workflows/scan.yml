name: Domain Agent Scan

on:
  schedule:
    - cron: "0 6 * * *"    # 7h Paris (UTC+1)
    - cron: "0 11 * * *"   # 13h Paris
    - cron: "0 17 * * *"   # 19h Paris
  workflow_dispatch:         # déclenchement manuel depuis GitHub

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r agent/requirements.txt

      - name: Run domain agent
        env:
          GOOGLE_SHEET_NAME:        ${{ secrets.GOOGLE_SHEET_NAME }}
          GCP_SERVICE_ACCOUNT_JSON: ${{ secrets.GCP_SERVICE_ACCOUNT_JSON }}
          GMAIL_FROM:               ${{ secrets.GMAIL_FROM }}
          GMAIL_TO:                 ${{ secrets.GMAIL_TO }}
          GMAIL_APP_PASSWORD:       ${{ secrets.GMAIL_APP_PASSWORD }}
          OPR_API_KEY:              ${{ secrets.OPR_API_KEY }}
        run: python agent/agent.py
